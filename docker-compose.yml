services:
  backend:
    image: vienvu/quanly-phongkham-backend:${TAG}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: 3000

  cms:
    image: vienvu/quanly-phongkham-cms:${TAG}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
    expose:
      - "80"

  landing:
    image: vienvu/quanly-phongkham-landing:${TAG}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      LANDING_API_URL: ${LANDING_API_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    expose:
      - "3000"

  proxy:
    image: vienvu/quanly-phongkham-proxy:${TAG}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
      - cms
      - landing
    ports:
      - "${APP_PORT}:80"

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "${WATCHTOWER_POLL_INTERVAL}"
    environment:
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend
      - cms
      - landing
      - proxy
