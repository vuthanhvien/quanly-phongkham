services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic}
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: vienvu/quanly-phongkham-backend:${TAG:-latest}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://clinic:clinic_password@postgres:5432/clinic}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@thienchanh.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  cms:
    image: vienvu/quanly-phongkham-cms:${TAG:-latest}
    depends_on:
      - backend
    expose:
      - "80"

  landing:
    image: vienvu/quanly-phongkham-landing:${TAG:-latest}
    environment:
      LANDING_API_URL: ${LANDING_API_URL:-http://backend:3000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    depends_on:
      - backend
    ports:
      - "${LANDING_PORT:-3001}:3000"

  proxy:
    image: vienvu/quanly-phongkham-proxy:${TAG:-latest}
    depends_on:
      - backend
      - cms
    ports:
      - "${CMS_PORT:-80}:80"

volumes:
  postgres_data:
