services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic}
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: vienvu/quanly-phongkham-backend:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://clinic:clinic_password@postgres:5432/clinic}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@thienchanh.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  cms:
    image: vienvu/quanly-phongkham-cms:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
    expose:
      - "80"

  landing:
    image: vienvu/quanly-phongkham-landing:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      LANDING_API_URL: ${LANDING_API_URL:-http://backend:3000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - backend
    expose:
      - "3000"

  proxy:
    image: vienvu/quanly-phongkham-proxy:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
      - cms
      - landing
    ports:
      - "${APP_PORT:-80}:80"

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "${WATCHTOWER_POLL_INTERVAL:-300}"
    environment:
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend
      - cms
      - landing
      - proxy

volumes:
  postgres_data:
