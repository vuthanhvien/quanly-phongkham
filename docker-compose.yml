services:
  backend:
    image: vienvu/quanly-phongkham-backend:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://clinic:clinic_password@host.docker.internal:3306/clinic}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@thienchanh.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      PORT: 3000

  cms:
    image: vienvu/quanly-phongkham-cms:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
    expose:
      - "80"

  landing:
    image: vienvu/quanly-phongkham-landing:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      LANDING_API_URL: ${LANDING_API_URL:-http://backend:3000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - backend
    expose:
      - "3000"

  proxy:
    image: vienvu/quanly-phongkham-proxy:${TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
      - cms
      - landing
    ports:
      - "${APP_PORT:-9999}:80"

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "${WATCHTOWER_POLL_INTERVAL:-300}"
    environment:
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend
      - cms
      - landing
      - proxy
