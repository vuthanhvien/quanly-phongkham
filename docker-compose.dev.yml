services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic}
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://clinic:clinic_password@postgres:5432/clinic}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@thienchanh.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: UsePolling
      TSC_WATCHDIRECTORY: UsePolling
    command:
      - sh
      - -lc
      - npm install && npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      VITE_LANDING_URL: ${VITE_LANDING_URL:-http://localhost:3001}
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -lc
      - npm install && npm run dev
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./cms:/app
      - cms_node_modules:/app/node_modules

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.dev
    environment:
      LANDING_API_URL: ${LANDING_API_URL:-http://backend:3000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -lc
      - npm install && npm run dev
    depends_on:
      - backend
    ports:
      - "3001:3000"
    volumes:
      - ./landing:/app
      - landing_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  cms_node_modules:
  landing_node_modules: