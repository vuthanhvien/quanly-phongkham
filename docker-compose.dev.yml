services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://root:@host.docker.internal:3306/clinic}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@thienchanh.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: UsePolling
      TSC_WATCHDIRECTORY: UsePolling
    command:
      - sh
      - -lc
      - npm install && npm run start:dev
    expose:
      - "3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:3000}
      VITE_BASE_PATH: ${VITE_BASE_PATH:-/admin/}
      VITE_LANDING_URL: ${VITE_LANDING_URL:-http://localhost}
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -lc
      - npm install && npm run dev
    depends_on:
      - backend
    expose:
      - "5173"
    volumes:
      - ./cms:/app
      - cms_node_modules:/app/node_modules

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.dev
    environment:
      LANDING_API_URL: ${LANDING_API_URL:-http://backend:3000/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -lc
      - npm install && npm run dev
    depends_on:
      - backend
    expose:
      - "3000"
    volumes:
      - ./landing:/app
      - landing_node_modules:/app/node_modules

  proxy:
    image: nginx:alpine
    depends_on:
      - backend
      - cms
      - landing
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./proxy/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend_node_modules:
  cms_node_modules:
  landing_node_modules:
